<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Soul Name | Your Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --accent: #3b82f6;
            --bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .result-card {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .api-key-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #eff6ff;
            border-radius: 16px;
            display: none; /* Hidden if key exists */
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .loading-spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .name-display {
            display: none;
        }

        .korean-name {
            font-family: 'Noto Serif KR', serif;
            font-size: 4rem;
            font-weight: 700;
            margin: 20px 0 5px 0;
            color: var(--primary);
        }

        .hanja {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            letter-spacing: 0.2em;
        }

        .summary-box {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .meaning-box {
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #4b5563;
        }

        .btn {
            margin-top: 30px;
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 100px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        #error-msg { color: #ef4444; margin-top: 10px; font-size: 0.8rem; display: none; }
    </style>
</head>
<body>

    <div class="result-card">
        <div id="api-setup" class="api-key-section">
            <p style="font-weight: 600; font-size: 0.9rem;">Enter your Gemini API Key to see the result:</p>
            <input type="password" id="api-key-input" placeholder="Paste your API key here...">
            <button class="btn" onclick="startAnalysis()">Reveal My Name</button>
            <p id="error-msg">Invalid API key or error occurred.</p>
        </div>

        <div id="loading" class="loading-spinner"></div>
        <p id="loading-text" style="display: none;">AI naming master is crafting your name...</p>

        <div id="result-display" class="name-display">
            <p style="text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; color: var(--accent); font-weight: 800;">Your Korean Soul Name</p>
            <h1 class="korean-name" id="res-korean"></h1>
            <p class="hanja" id="res-hanja"></p>
            
            <div class="summary-box" id="res-summary"></div>
            <div class="meaning-box" id="res-meaning"></div>

            <button class="btn" onclick="window.location.href='index.html'" style="background: #eee; color: #333; margin-top: 40px;">Try Again</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const traits = urlParams.get('traits')?.split('|') || [];

        // Check if API key is already in localStorage
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            document.getElementById('api-setup').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading-text').style.display = 'block';
            callGemini(savedKey);
        } else {
            document.getElementById('api-setup').style.display = 'block';
        }

        function startAnalysis() {
            const key = document.getElementById('api-key-input').value;
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                document.getElementById('api-setup').style.display = 'none';
                document.getElementById('loading').style.display = 'block';
                document.getElementById('loading-text').style.display = 'block';
                callGemini(key);
            }
        }

        async function callGemini(apiKey) {
            const prompt = `You are an expert Korean naming master. Based on the following 10 personality traits, create a beautiful and authentic Korean name (Surname + Given name).
Traits: ${traits.join(', ')}

Provide the response strictly in this JSON format:
{
  "koreanName": "Full name in Hangul",
  "hanja": "Name in Hanja characters",
  "personalitySummary": "A one-sentence personality analysis (English)",
  "nameMeaning": "A detailed explanation of the name's meaning and why it was chosen based on the traits (English)"
}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { response_mime_type: "application/json" }
                    })
                });

                const data = await response.json();
                const resultText = data.candidates[0].content.parts[0].text;
                const resultJson = JSON.parse(resultText);

                displayResult(resultJson);
            } catch (error) {
                console.error(error);
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('api-setup').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                document.getElementById('loading-text').style.display = 'none';
            }
        }

        function displayResult(res) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('result-display').style.display = 'block';

            document.getElementById('res-korean').innerText = res.koreanName;
            document.getElementById('res-hanja').innerText = res.hanja;
            document.getElementById('res-summary').innerText = res.personalitySummary;
            document.getElementById('res-meaning').innerText = res.nameMeaning;
        }
    </script>
</body>
</html>
