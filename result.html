<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Soul Name | Your Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --accent: #3b82f6;
            --bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .result-card {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .name-display {
            display: none;
        }

        .korean-name {
            font-family: 'Noto Serif KR', serif;
            font-size: 4.5rem;
            font-weight: 700;
            margin: 20px 0 5px 0;
            color: var(--primary);
        }

        .hanja {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            letter-spacing: 0.2em;
        }

        .summary-box {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
            color: var(--text-main);
        }

        .meaning-box {
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #4b5563;
        }

        .btn {
            margin-top: 30px;
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 100px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .btn:hover { background: #222; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="result-card">
        <div id="loading-section">
            <div class="loading-spinner"></div>
            <p style="margin-top: 20px; color: var(--text-muted); font-weight: 500;">AI naming master is crafting your name...</p>
        </div>

        <div id="result-display" class="name-display">
            <p style="text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; color: var(--accent); font-weight: 800;">Your Korean Soul Name</p>
            <h1 class="korean-name" id="res-korean"></h1>
            <p class="hanja" id="res-hanja"></p>
            
            <div class="summary-box" id="res-summary"></div>
            <div class="meaning-box" id="res-meaning"></div>

            <button class="btn" onclick="window.location.href='index.html'" style="background: #eee; color: #333; margin-top: 40px;">Try Again</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const traits = urlParams.get('traits')?.split('|') || [];

        async function fetchResult() {
            try {
                // Cloudflare Function을 통해 안전하게 데이터 요청
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ traits })
                });

                const res = await response.json();
                displayResult(res);
            } catch (error) {
                console.error("Analysis failed:", error);
                // 오류 시 기본 결과 표시
                displayResult({
                    "koreanName": "Kim Seo-yoon",
                    "hanja": "金舒潤",
                    "personalitySummary": "A warm and balanced soul who brings harmony to others.",
                    "nameMeaning": "Your traits suggest a heart that nurtures and protects. This name represents comfort and resilience."
                });
            }
        }

        function displayResult(res) {
            document.getElementById('loading-section').style.display = 'none';
            document.getElementById('result-display').style.display = 'block';

            document.getElementById('res-korean').innerText = res.koreanName;
            document.getElementById('res-hanja').innerText = res.hanja;
            document.getElementById('res-summary').innerText = res.personalitySummary;
            document.getElementById('res-meaning').innerText = res.nameMeaning;
        }

        // 페이지 로드 시 바로 실행
        fetchResult();
    </script>
</body>
</html>
