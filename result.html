<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Soul Name | Your Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --accent: #3b82f6;
            --bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .result-card {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.07);
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f4f6;
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .name-display {
            display: none;
        }

        .romanized-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 5px;
            letter-spacing: -0.02em;
        }

        .korean-name {
            font-family: 'Noto Serif KR', serif;
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
            line-height: 1;
        }

        .hanja {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            letter-spacing: 0.3em;
            font-weight: 400;
        }

        .label {
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 800;
            color: #9ca3af;
            letter-spacing: 0.15em;
            margin-bottom: 15px;
        }

        .summary-box {
            background: #f8fafc;
            padding: 24px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            line-height: 1.5;
            color: #1e293b;
            border: 1px solid #f1f5f9;
        }

        .meaning-box {
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #475569;
            background: #fff;
            padding: 0 10px;
        }

        .btn {
            margin-top: 40px;
            padding: 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background: #222;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        @media (max-width: 500px) {
            .result-card { padding: 30px 20px; }
            .korean-name { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="result-card">
        <div id="loading-section" class="loading-section">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-weight: 500;">Finalizing your identity...</p>
        </div>

        <div id="result-display" class="name-display">
            <p class="label">Your Korean Soul Name</p>
            <div class="romanized-name" id="res-romanized"></div>
            <h1 class="korean-name" id="res-korean"></h1>
            <p class="hanja" id="res-hanja"></p>
            
            <p class="label">Soul Analysis</p>
            <div class="summary-box" id="res-summary"></div>
            
            <p class="label">Name Meaning</p>
            <div class="meaning-box" id="res-meaning"></div>

            <button class="btn" onclick="window.location.href='index.html'" style="background: #f3f4f6; color: #4b5563; box-shadow: none;">Take Quiz Again</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const traits = urlParams.get('traits')?.split('|') || [];

        async function fetchResult() {
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ traits })
                });

                const res = await response.json();
                displayResult(res);
            } catch (error) {
                console.error("Analysis failed:", error);
                displayResult({
                    "koreanName": "Lee Seo-yeon",
                    "romanizedName": "Lee Seo-yeon",
                    "hanja": "李瑞연",
                    "personalitySummary": "A graceful soul destined for beautiful connections.",
                    "nameMeaning": "Your traits suggest a heart that nurtures and protects. (Fallback: AI service encountered an error, please check API key settings!)"
                });
            }
        }

        function displayResult(res) {
            document.getElementById('loading-section').style.display = 'none';
            document.getElementById('result-display').style.display = 'block';

            document.getElementById('res-korean').innerText = res.koreanName;
            document.getElementById('res-romanized').innerText = res.romanizedName;
            document.getElementById('res-hanja').innerText = res.hanja;
            document.getElementById('res-summary').innerText = res.personalitySummary;
            document.getElementById('res-meaning').innerText = res.nameMeaning;
        }

        if (traits.length > 0) {
            fetchResult();
        } else {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
