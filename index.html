<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Soul Name | 한국 이름 생성기</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 90%;
            padding: 40px 20px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        h1 span {
            color: #0070f3;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2.5rem;
            word-break: keep-all;
        }

        .start-button {
            display: inline-block;
            width: 100%;
            padding: 18px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
            border: none;
        }

        .start-button:hover {
            background-color: #222;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>K-Soul <span>Name</span></h1>
        <p>당신의 성향을 분석하여 가장 잘 어울리는 한국식 이름을 찾아드립니다.</p>
        
        <button class="start-button">테스트 시작하기</button>

        <div class="footer">
            © 2026 K-Soul Name
        </div>
    </div>

</body>
</html>
